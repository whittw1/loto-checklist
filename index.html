      children:ch
    }]
  });
  const buf=await D.Packer.toBlob(doc);
  dlBlob(buf,"LOTO_Assessment_"+(f.name||"Export").replace(/[^a-zA-Z0-9]/g,"_")+"_"+new Date().toISOString().slice(0,10)+".docx");

const C={nv:"#1B3A5C",ac:"#2E75B6",lb:"#D6E4F0",or:"#E8751A",gn:"#2D8B4E",rd:"#C0392B",bg:"#F0F2F5",cd:"#FFFFFF",bd:"#D1D5DB",tp:"#1A1A2E",ts:"#5A6577",tl:"#8895A7"};
const fm="'Barlow Condensed','Segoe UI',sans-serif";const fb="'Barlow','Segoe UI',sans-serif";

function Modal({title,text,onOk,onNo,okLbl,dng}){
  return(<div className="modal-overlay" onClick={onNo}><div className="modal-box" onClick={e=>e.stopPropagation()}>
    <div className="modal-title">{title}</div><div className="modal-text">{text}</div>
    <div className="modal-btns"><button className="modal-btn cancel" onClick={onNo}>Cancel</button>
    <button className={"modal-btn "+(dng?"danger":"confirm")} onClick={onOk}>{okLbl||"Confirm"}</button></div>
  </div></div>);
}
function PB({c:ch,t:to}){const p=to>0?Math.round(ch/to*100):0;const co=p===100?C.gn:p>50?C.ac:C.or;
  return(<div style={{display:"flex",alignItems:"center",gap:8,minWidth:100}}>
    <div style={{flex:1,height:6,background:"#E5E7EB",borderRadius:3,overflow:"hidden"}}><div style={{width:p+"%",height:"100%",background:co,borderRadius:3,transition:"width 0.3s"}}/></div>
    <span style={{fontFamily:fm,fontSize:13,color:C.ts,whiteSpace:"nowrap"}}>{ch}/{to}</span></div>);}
function SH({title,sub,open,onTgl,c,t,tag,tc}){
  return(<div onClick={onTgl} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",cursor:"pointer",userSelect:"none",background:open?C.nv:C.cd,borderRadius:open?"10px 10px 0 0":10,border:"1px solid "+(open?C.nv:C.bd),transition:"all 0.2s",flexWrap:"wrap",gap:8}}>
    <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:200}}>
      <span style={{fontSize:16,color:open?"#FFF":C.nv,transition:"transform 0.2s",transform:open?"rotate(90deg)":"rotate(0deg)",display:"inline-block"}}>{"\u25B6"}</span>
      <div><div style={{fontFamily:fm,fontWeight:700,fontSize:15,color:open?"#FFF":C.nv,letterSpacing:"0.02em"}}>{title}</div>
      {sub&&<div style={{fontSize:11,color:open?C.lb:C.ts,marginTop:1}}>{sub}</div>}</div>
      {tag&&<span style={{fontSize:10,fontWeight:700,fontFamily:fm,padding:"2px 8px",borderRadius:4,background:tc||C.ac,color:"#FFF",letterSpacing:"0.05em",textTransform:"uppercase"}}>{tag}</span>}
    </div><div style={{minWidth:120}}><PB c={c} t={t}/></div></div>);}
function SSH({title}){return(<div style={{padding:"10px 14px",background:C.lb,fontFamily:fm,fontWeight:700,fontSize:13,color:C.nv,letterSpacing:"0.02em",borderBottom:"1px solid "+C.bd}}>{title}</div>);}
function CR({it,idx,chk,onChk,note,onNt}){
  return(<div style={{display:"flex",borderBottom:"1px solid "+C.bd,background:idx%2===0?"#FAFBFC":C.cd}}>
    <div style={{width:40,display:"flex",alignItems:"center",justifyContent:"center",borderRight:"1px solid "+C.bd,flexShrink:0}}><input type="checkbox" checked={chk} onChange={onChk}/></div>
    <div style={{width:32,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:fm,fontSize:12,color:C.ts,borderRight:"1px solid "+C.bd,flexShrink:0}}>{idx+1}</div>
    <div className="cit" style={{flex:3,padding:"8px 10px",fontSize:13,lineHeight:1.5,color:C.tp,fontFamily:fb,borderRight:"1px solid "+C.bd}}>{it.x}</div>
    <div className="cref" style={{flex:0.8,padding:"8px 6px",fontSize:11,color:C.ts,fontFamily:fm,borderRight:"1px solid "+C.bd,minWidth:90}}>{it.r}</div>
    <div style={{flex:1.2,padding:"4px 4px",minWidth:120}}><textarea value={note} onChange={onNt} placeholder="Notes..." style={{width:"100%",height:"100%",minHeight:34,border:"1px solid #E5E7EB",borderRadius:4,padding:"5px 6px",fontSize:12,fontFamily:fb,resize:"vertical",color:C.tp,background:"#FAFBFC"}}/></div></div>);}
function CT({sk,chk,nts,onChk,onNt}){const d=SD[sk];return(<div><SSH title={d.t}/>{d.i.map((it,i)=>{const k=sk+"_"+i;return <CR key={k} it={it} idx={i} chk={!!chk[k]} onChk={()=>onChk(k)} note={nts[k]||""} onNt={e=>onNt(k,e.target.value)}/>;})}</div>);}
function NB({lbl,val,onChange}){return(<div style={{padding:14,borderTop:"2px solid "+C.ac}}><label style={{fontFamily:fm,fontWeight:700,fontSize:13,color:C.nv,display:"block",marginBottom:6}}>{lbl}</label>
  <textarea value={val} onChange={e=>onChange(e.target.value)} placeholder="Enter notes here..." style={{width:"100%",minHeight:70,border:"1px solid "+C.bd,borderRadius:6,padding:"8px 10px",fontSize:13,fontFamily:fb,resize:"vertical",color:C.tp}}/></div>);}
function IF({lbl,val,onChange,w}){return(<div style={{flex:w||1}}><label style={{display:"block",fontSize:10,fontFamily:fm,fontWeight:600,color:C.ts,marginBottom:3,textTransform:"uppercase",letterSpacing:"0.05em"}}>{lbl}</label>
  <input type="text" value={val||""} onChange={e=>onChange(e.target.value)} style={{width:"100%",padding:"7px 8px",border:"1px solid "+C.bd,borderRadius:6,fontSize:13,fontFamily:fb,color:C.tp,background:"#FAFBFC"}}/></div>);}
function SIB({inf,onChange}){const s=(k,v)=>onChange({...inf,[k]:v});
  return(<div className="ig" style={{display:"flex",flexWrap:"wrap",gap:10,padding:"10px 14px",background:C.lb,borderBottom:"1px solid "+C.bd}}>
    <IF lbl="Shop / Service Line" val={inf.shop} onChange={v=>s("shop",v)} w={2}/><IF lbl="Date" val={inf.date} onChange={v=>s("date",v)}/>
    <IF lbl="Employee(s)" val={inf.emp} onChange={v=>s("emp",v)} w={2}/><IF lbl="Title" val={inf.title} onChange={v=>s("title",v)}/>
    <IF lbl="Equipment / Procedure" val={inf.equip} onChange={v=>s("equip",v)} w={3}/></div>);}
function SII({inf,onChange}){const s=(k,v)=>onChange({...inf,[k]:v});
  return(<div className="ig" style={{display:"flex",flexWrap:"wrap",gap:10,padding:"10px 14px",background:C.lb,borderBottom:"1px solid "+C.bd}}>
    <IF lbl="Shop" val={inf.shop} onChange={v=>s("shop",v)} w={2}/><IF lbl="Date" val={inf.date} onChange={v=>s("date",v)}/>
    <IF lbl="# Authorized" val={inf.nAuth} onChange={v=>s("nAuth",v)}/><IF lbl="Supervisor" val={inf.sup} onChange={v=>s("sup",v)}/>
    <IF lbl="Gatekeeper" val={inf.gk} onChange={v=>s("gk",v)}/><IF lbl="Person(s) Interviewed" val={inf.per} onChange={v=>s("per",v)}/></div>);}
function AB({lbl,onClick}){return(<button onClick={onClick} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",border:"2px dashed "+C.ac,borderRadius:8,background:"transparent",color:C.ac,fontFamily:fm,fontWeight:700,fontSize:13,cursor:"pointer"}}><span style={{fontSize:18,lineHeight:1}}>+</span> {lbl}</button>);}
function XB({onClick}){return(<button onClick={onClick} style={{padding:"3px 8px",border:"1px solid "+C.rd,borderRadius:5,background:"transparent",color:C.rd,fontFamily:fm,fontSize:12,cursor:"pointer",fontWeight:600}}>{"\u2715"}</button>);}
function cntC(chk,ks){let c=0,t=0;ks.forEach(k=>{SD[k].i.forEach((_,i)=>{t++;if(chk[k+"_"+i])c++;});});return{c,t};}
function SS({title,sub,sks,chk,nts,onChk,onNt,exN,onExN,exLbl}){const[o,setO]=useState(false);const r=cntC(chk,sks);
  return(<div style={{marginBottom:12}}><SH title={title} sub={sub} open={o} onTgl={()=>setO(!o)} c={r.c} t={r.t}/>
    {o&&<div style={{border:"1px solid "+C.bd,borderTop:0,borderRadius:"0 0 10px 10px",overflow:"hidden",background:C.cd}}>
      {sks.map(k=><CT key={k} sk={k} chk={chk} nts={nts} onChk={onChk} onNt={onNt}/>)}
      {exN!==undefined&&<NB lbl={exLbl||"Notes"} val={exN} onChange={onExN}/>}</div>}</div>);}

function DI({demo,onUpd,onRm}){const[o,setO]=useState(true);const r=cntC(demo.chk,["s7a","s7b","s7c"]);
  const lbl=demo.inf.equip||demo.inf.emp||"New Demonstration";
  return(<div style={{margin:"8px 0",border:"1px solid "+C.bd,borderRadius:8,overflow:"hidden"}}>
    <div onClick={()=>setO(!o)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"#F3F6FA",cursor:"pointer",userSelect:"none"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
        <span style={{fontSize:13,color:C.ac,transform:o?"rotate(90deg)":"rotate(0deg)",display:"inline-block",transition:"transform 0.2s"}}>{"\u25B6"}</span>
        <span style={{fontFamily:fm,fontWeight:600,fontSize:13,color:C.nv}}>{lbl}</span></div>
      <div style={{display:"flex",alignItems:"center",gap:10}}><PB c={r.c} t={r.t}/><XB onClick={e=>{e.stopPropagation();onRm();}}/></div></div>
    {o&&<div><SIB inf={demo.inf} onChange={inf=>onUpd({...demo,inf})}/>
      {["s7a","s7b","s7c"].map(k=><CT key={k} sk={k} chk={demo.chk} nts={demo.nts}
        onChk={ck=>onUpd({...demo,chk:{...demo.chk,[ck]:!demo.chk[ck]}})}
        onNt={(ck,v)=>onUpd({...demo,nts:{...demo.nts,[ck]:v}})}/>)}
      <div style={{padding:"10px 14px",borderTop:"2px solid "+C.ac}}>
        <label style={{fontFamily:fm,fontWeight:700,fontSize:13,color:C.nv,display:"block",marginBottom:6}}>Observations</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:12,marginBottom:8}}>
          <label style={{fontFamily:fb,fontSize:13,display:"flex",alignItems:"center",gap:5}}>
            <input type="checkbox" checked={!!demo.obs?.cor} onChange={()=>onUpd({...demo,obs:{...demo.obs,cor:!demo.obs?.cor}})}/> Corrective recs provided on-site</label>
          <label style={{fontFamily:fb,fontSize:13,display:"flex",alignItems:"center",gap:5}}>
            <input type="checkbox" checked={!!demo.obs?.rec} onChange={()=>onUpd({...demo,obs:{...demo.obs,rec:!demo.obs?.rec}})}/> Error likely to recur</label></div>
        <textarea value={demo.obs?.n||""} placeholder="Errors observed, best practices noted..." onChange={e=>onUpd({...demo,obs:{...demo.obs,n:e.target.value}})}
          style={{width:"100%",minHeight:50,border:"1px solid "+C.bd,borderRadius:6,padding:"8px 10px",fontSize:13,fontFamily:fb,resize:"vertical"}}/></div>
    </div>}</div>);}

  const tgl=id=>setOs(p=>({...p,[id]:!p[id]}));

          onNo:()=>setMdl(null)});}catch(er){toast("\u2717 Could not read file","#C0392B");}};rd.readAsText(f);inp.value="";};inp.click();},onNo:()=>setMdl(null)});

            {iO&&<div style={{border:"1px solid "+C.bd,borderTop:0,borderRadius:"0 0 8px 8px",overflow:"hidden"}}>
              {rInfo(inst)}{rCont(inst)}<NB lbl="Notes" val={inst.exN} onChange={v=>setI(p=>p.map(x=>x.id===inst.id?{...x,exN:v}:x))}/></div>}</div>);})}
        <div style={{marginTop:10}}><AB lbl="Add Shop" onClick={()=>setI(p=>[...p,nwFn()])}/></div></div>}</div>);}

  return(<div style={{fontFamily:fb,background:C.bg,minHeight:"100vh"}}>
    {mdl&&<Modal title={mdl.title} text={mdl.text} onOk={mdl.onOk} onNo={mdl.onNo} okLbl={mdl.okLbl} dng={mdl.dng}/>}

    {/* HEADER */}
    <div style={{background:"linear-gradient(135deg, "+C.nv+" 0%, #0D2137 100%)",padding:"14px 0",position:"sticky",top:0,zIndex:100}}>
      <div style={{maxWidth:1100,margin:"0 auto",padding:"0 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <div><div style={{fontFamily:fm,fontWeight:700,fontSize:20,color:"#FFF",letterSpacing:"0.03em"}}>LOTO PROGRAM ASSESSMENT</div>
            <div style={{fontFamily:fm,fontSize:11,color:C.lb,letterSpacing:"0.05em",marginTop:1}}>36C24124A0049 — VISN 1</div></div>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}} className="tbw">
            <div style={{textAlign:"right",marginRight:4}}>
              <div style={{fontFamily:fm,fontSize:10,color:C.lb,textTransform:"uppercase",letterSpacing:"0.05em"}}>Progress</div>
              <div style={{fontFamily:fm,fontSize:18,fontWeight:700,color:"#FFF"}}>{op.t>0?Math.round(op.c/op.t*100):0}%</div></div>
            <div style={{width:80}}><PB c={op.c} t={op.t}/></div>
            <button className="tb" onClick={doBackup}>{"\uD83D\uDCBE"} Backup</button>
            <button className="tb" onClick={doRestore}>{"\uD83D\uDCC2"} Restore</button>
            <button className="tb" onClick={doExport}>{"\uD83D\uDCC4"} Word</button>
            <button className="tb dng" onClick={doReset}>{"\uD83D\uDDD1"} Reset</button>
          </div></div></div></div>

    <div style={{maxWidth:1100,margin:"0 auto",padding:"16px 16px 60px"}}>
      {/* FACILITY */}
      <div style={{background:C.cd,borderRadius:10,border:"1px solid "+C.bd,padding:16,marginBottom:16}}>
        <div style={{fontFamily:fm,fontWeight:700,fontSize:14,color:C.nv,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Facility Information</div>
        <div className="ig" style={{display:"flex",flexWrap:"wrap",gap:10}}>
          <IF lbl="Facility" val={fac.name} onChange={v=>setFac(p=>({...p,name:v}))} w={3}/>
          <IF lbl="Date(s)" val={fac.dates} onChange={v=>setFac(p=>({...p,dates:v}))}/>
          <IF lbl="Assessor" val={fac.assessor} onChange={v=>setFac(p=>({...p,assessor:v}))} w={3}/><div style={{flex:1}}/>
          <IF lbl="Facility POC" val={fac.poc} onChange={v=>setFac(p=>({...p,poc:v}))} w={2}/>
          <IF lbl="POC Phone" val={fac.pocPh} onChange={v=>setFac(p=>({...p,pocPh:v}))}/>
          <IF lbl="Safety Manager" val={fac.sMgr} onChange={v=>setFac(p=>({...p,sMgr:v}))}/>
          <IF lbl="Safety Mgr Phone" val={fac.sMgrPh} onChange={v=>setFac(p=>({...p,sMgrPh:v}))}/></div></div>

      <SS title="Section 2: MCP/SOP Review" sks={["s2a","s2b","s2c","s2d","s2e","s2f"]} chk={chk} nts={nts} onChk={oCk} onNt={oNt}/>
      <SS title="Section 3: Inventory & Document Control" sks={["s3"]} chk={chk} nts={nts} onChk={oCk} onNt={oNt}/>

      {shopAcc("s4w","Section 4: Procedure Evaluation","Per-shop equipment sampling",s4,setS4,["s4a"],
        inst=><SIB inf={inst.inf} onChange={inf=>setS4(p=>p.map(x=>x.id===inst.id?{...x,inf}:x))}/>,
        inst=><CT sk="s4a" chk={inst.chk} nts={inst.nts} onChk={k=>setS4(p=>p.map(x=>x.id===inst.id?{...x,chk:{...x.chk,[k]:!x.chk[k]}}:x))} onNt={(k,v)=>setS4(p=>p.map(x=>x.id===inst.id?{...x,nts:{...x.nts,[k]:v}}:x))}/>,
        ()=>({id:uid(),inf:{shop:"",date:"",emp:"",title:"",equip:""},chk:iC(["s4a"]),nts:iN(["s4a"]),exN:""}))}

      <SS title="Section 5: LOTO Training Audit" sks={["s5"]} chk={chk} nts={nts} onChk={oCk} onNt={oNt} exN={exN.s5} onExN={v=>setExN(p=>({...p,s5:v}))} exLbl="Training Notes"/>

      {shopAcc("s6w","Section 6: Shop-Level LOTO Interview","Per-shop questionnaire",s6,setS6,["s6a","s6b","s6c","s6d"],
        inst=><SII inf={inst.inf} onChange={inf=>setS6(p=>p.map(x=>x.id===inst.id?{...x,inf}:x))}/>,
        inst=><>{["s6a","s6b","s6c","s6d"].map(k=><CT key={k} sk={k} chk={inst.chk} nts={inst.nts} onChk={ck=>setS6(p=>p.map(x=>x.id===inst.id?{...x,chk:{...x.chk,[ck]:!x.chk[ck]}}:x))} onNt={(ck,v)=>setS6(p=>p.map(x=>x.id===inst.id?{...x,nts:{...x.nts,[ck]:v}}:x))}/>)}</>,
        ()=>({id:uid(),inf:{shop:"",date:"",nAuth:"",sup:"",gk:"",per:""},chk:iC(["s6a","s6b","s6c","s6d"]),nts:iN(["s6a","s6b","s6c","s6d"]),exN:""}))}

      {/* S7: KSA + nested demos */}
      {(()=>{const aO=os["s7w"];let tc=0,cc=0;
        s7.forEach(inst=>inst.demos.forEach(d=>["s7a","s7b","s7c"].forEach(k=>SD[k].i.forEach((_,i)=>{tc++;if(d.chk[k+"_"+i])cc++;}))));
        return(<div style={{marginBottom:12}}><SH title="Section 7: Employee KSA Assessment" sub="Per-shop with nested equipment demonstrations" open={aO} onTgl={()=>tgl("s7w")} c={cc} t={tc} tag="Per Shop + Demo" tc={C.or}/>
          {aO&&<div style={{border:"1px solid "+C.bd,borderTop:0,borderRadius:"0 0 10px 10px",padding:14,background:C.cd}}>
            {s7.map((inst,idx)=>{const iO=os[inst.id];let sc=0,st=0;
              inst.demos.forEach(d=>["s7a","s7b","s7c"].forEach(k=>SD[k].i.forEach((_,i)=>{st++;if(d.chk[k+"_"+i])sc++;})));
              return(<div key={inst.id} style={{marginBottom:8}}>
                <div onClick={()=>tgl(inst.id)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:iO?"#EDF2F8":"#F9FAFB",borderRadius:iO?"8px 8px 0 0":8,border:"1px solid "+C.bd,cursor:"pointer",userSelect:"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:13,color:C.ac,transform:iO?"rotate(90deg)":"rotate(0deg)",display:"inline-block",transition:"transform 0.2s"}}>{"\u25B6"}</span>
                    <span style={{fontFamily:fm,fontWeight:600,fontSize:14,color:C.nv}}>{inst.shop||("Shop "+(idx+1))}</span>
                    <span style={{fontFamily:fm,fontSize:12,color:C.ts}}>{"\u2014 "+inst.demos.length+" demo"+(inst.demos.length!==1?"s":"")}</span></div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}><PB c={sc} t={st}/><XB onClick={e=>{e.stopPropagation();setS7(p=>p.filter(x=>x.id!==inst.id));}}/></div></div>
                {iO&&<div style={{border:"1px solid "+C.bd,borderTop:0,borderRadius:"0 0 8px 8px",padding:10}}>
                  <div style={{marginBottom:8}}><IF lbl="Shop Name" val={inst.shop} onChange={v=>setS7(p=>p.map(x=>x.id===inst.id?{...x,shop:v}:x))}/></div>
                  {inst.demos.map(demo=><DI key={demo.id} demo={demo}
                    onUpd={u=>setS7(p=>p.map(x=>x.id===inst.id?{...x,demos:x.demos.map(d=>d.id===demo.id?u:d)}:x))}
                    onRm={()=>setS7(p=>p.map(x=>x.id===inst.id?{...x,demos:x.demos.filter(d=>d.id!==demo.id)}:x))}/>)}
                  <div style={{marginTop:8}}><AB lbl="Add Equipment Demonstration" onClick={()=>setS7(p=>p.map(x=>x.id===inst.id?{...x,demos:[...x.demos,nwD()]}:x))}/></div>
                </div>}</div>);})}
            <div style={{marginTop:10}}><AB lbl="Add Shop" onClick={()=>setS7(p=>[...p,{id:uid(),shop:"",demos:[]}])}/></div></div>}</div>);})()}

      <SS title="Section 8: Contractor LOTO Review" sks={["s8"]} chk={chk} nts={nts} onChk={oCk} onNt={oNt} exN={exN.s8} onExN={v=>setExN(p=>({...p,s8:v}))} exLbl="Contractor Notes"/>
      <SS title="Section 9: Equipment & Facility Walkthrough" sks={["s9"]} chk={chk} nts={nts} onChk={oCk} onNt={oNt} exN={exN.s9} onExN={v=>setExN(p=>({...p,s9:v}))} exLbl="Walkthrough Notes"/>
      <SS title="Section 10: Post-Visit Report Requirements" sks={["s10"]} chk={chk} nts={nts} onChk={oCk} onNt={oNt}/>

      <div style={{marginTop:28,padding:"14px 0",borderTop:"2px solid "+C.bd,textAlign:"center"}}>
        <div style={{fontFamily:fm,fontSize:12,color:C.tl}}>HGS Engineering, Inc. — 36C24124A0049 — VISN 1 LOTO System Support BPA — Confidential</div>
        <div style={{fontFamily:fm,fontSize:11,color:C.tl,marginTop:4}}>Data auto-saves to this device. Use Backup button to protect against data loss.</div></div>
    </div></div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
